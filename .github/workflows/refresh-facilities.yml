name: Refresh Facility Data

on:
  schedule:
    # Runs at midnight on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests urllib3

      - name: Back up user-added custom facilities
        run: |
          # The JSON file contains only API-sourced facilities.
          # User notes, custom facilities, and edits live in browser localStorage
          # and are never touched by this workflow.
          echo "oregon_sud_facilities.json will be refreshed from SAMHSA API."
          echo "User localStorage data (notes, custom facilities, edits) is unaffected."

      - name: Fetch latest facility data
        run: python fetch_oregon_facilities.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add oregon_sud_facilities.json
          if git diff --staged --quiet; then
            echo "No changes to facility data — skipping commit."
          else
            FACILITY_COUNT=$(python -c "import json; d=json.load(open('oregon_sud_facilities.json')); print(d['metadata']['total_facilities'])")
            git commit -m "chore: refresh facility data (${FACILITY_COUNT} facilities) [$(date +'%Y-%m-%d')]"
            git push
          fi
