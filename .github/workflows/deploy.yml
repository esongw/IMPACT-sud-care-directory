name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into HTML
        env:
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import os, sys
          login_pw = os.environ.get('LOGIN_PASSWORD', '')
          admin_pw = os.environ.get('ADMIN_PASSWORD', '')
          if not login_pw or not admin_pw:
              print("ERROR: One or more secrets are empty!", file=sys.stderr)
              sys.exit(1)
          with open('index.html', 'r') as f:
              content = f.read()
          content = content.replace('__LOGIN_PASSWORD__', login_pw)
          content = content.replace('__ADMIN_PASSWORD__', admin_pw)
          with open('index.html', 'w') as f:
              f.write(content)
          print("Secrets injected successfully.")
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
